    image_manifest: manifests/images/swebench_verified.yaml
    image_policy: optional
    model_profile: qwen3_coder_30b_a3b_sglang_future
    concurrency: 1
    params:
      MAX_CONCURRENCY: 1
      QWEN_NATIVE_SUBSET: smoke_n20
      QWEN_NATIVE_MAX_WORKERS: 1
      QWEN_NATIVE_BUILD_WORKERS: 1
      QWEN_NATIVE_AGENT_TIMEOUT_S: 3600
      QWEN_NATIVE_VERIFIER_TIMEOUT_S: 1800

  - id: repozero_py2js_smoke
