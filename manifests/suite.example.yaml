schema_version: agentic_bench.suite.v1

suite:
  id: dev_worker_smoke_dryrun
  mode: smoke
  controller_host: dev
  execution_kind: ssh_worker
  bench_root: /data/nips/bench
  default_worker_host: ws-4d5210c60d64c583-worker-j9jjd.zengweijun+root.ailab-sciversealign.pod@h.pjlab.org.cn
  concurrency: 40
  proxy_concurrency_ceiling: 50
  run_root: /mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench/runs
  source_env_files:
    - ~/.bashrc
    - /data/nips/shared_bench/api_config.env
  offline_policy:
    network_policy: offline_or_internal_only
    forbid_public_internet: true
    rootless_required: true
    asset_stage_host: dev
    downloads_allowed_on_worker: false

worker:
  id: worker-j9jjd
  host: ws-4d5210c60d64c583-worker-j9jjd.zengweijun+root.ailab-sciversealign.pod@h.pjlab.org.cn
  hostname: zwj2-64rlk-3469265-worker-0
  ssh_from_local: ok
  ssh_from_dev: blocked_publickey
  ssh_dispatch_path: local_ok_dev_blocked_publickey
  ssh_options:
    - -C
    - -A
    - -X
    - -Y
    - -o
    - BatchMode=yes
    - -o
    - ConnectTimeout=20
  rootless: true
  rootless_caveat: Docker daemon reports name=rootless, but SSH user is root and DOCKER_HOST is not exported by default.
  container_engine: docker
  docker_host: unix:///tmp/rl/run/docker.sock
  compose_version: Docker Compose v2.27.0
  tmp_root: /data/tmp/agentic-foundation-model-bench
  shared_root: /mnt/shared-storage-user/mineru2-shared/zengweijun
  network_policy: offline_or_internal_only
  offline: true
  env:
    BENCH_OFFLINE: "1"
    DOCKER_API_VERSION: "1.45"
    NO_PROXY: "127.0.0.1,localhost,100.96.1.101,100.96.0.0/12,.pjlab.org.cn"
    no_proxy: "127.0.0.1,localhost,100.96.1.101,100.96.0.0/12,.pjlab.org.cn"

image_preflight:
  project_root: ..
  max_concurrency: 4
  asset_root: /mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench
  default_policy: optional
  load_fallback: true
  run_smoke: true
  json: true

model_profiles:
  - id: gpt54mini_8130
    model_name: gpt-5.4-mini
    litellm_model: openai/gpt-5.4-mini
    provider: openai_compatible_relay
    base_url: http://8.130.49.170/v1
    api_key_env: OPENAI_API_KEY
    api_key_policy: env_only
    reasoning_effort: xhigh
    temperature: "0.0"
    max_tokens: "4096"
    max_input_tokens: "128000"

  - id: dev_proxy_gpt54mini_8130
    model_name: gpt-5.4-mini
    litellm_model: openai/gpt-5.4-mini
    bench_model_profile: gpt54mini_8130
    provider: openai_compatible_dev_proxy
    base_url: http://100.96.1.101:18540/v1
    api_key_env: OPENAI_API_KEY
    api_key_policy: env_only
    reasoning_effort: xhigh
    temperature: "0.0"
    max_tokens: "4096"
    max_input_tokens: "128000"

  - id: gpt54_8130
    model_name: gpt-5.4
    litellm_model: openai/gpt-5.4
    provider: openai_compatible_relay
    base_url: http://8.130.49.170/v1
    api_key_env: OPENAI_API_KEY
    api_key_policy: env_only
    reasoning_effort: xhigh
    temperature: "0.0"
    max_tokens: "4096"
    max_input_tokens: "128000"

  - id: qwen3_coder_30b_a3b_sglang_future
    model_name: Qwen/Qwen3-Coder-30B-A3B-Instruct
    litellm_model: openai/Qwen/Qwen3-Coder-30B-A3B-Instruct
    provider: sglang
    base_url_env: SGLANG_OPENAI_BASE_URL
    api_key_env: SGLANG_OPENAI_API_KEY
    api_key_policy: empty_allowed
    reasoning_effort: ""
    temperature: "0.0"
    max_tokens: "65536"
    max_input_tokens: "128000"

benches:
  - id: vitabench_full
    benchmark: vitabench
    adapter: vitabench_full
    adapter_script: run_vitabench_full.sh
    adapter_status: wired_legacy
    model_profile: gpt54mini_8130
    concurrency: 1
    params:
      NUM_TASKS: 1
      NUM_TRIALS: 1
      MAX_CONCURRENCY: 1
      VITA_DOMAIN: delivery
      VITA_MAX_STEPS: 120
      VITA_ENABLE_THINK: 0
      VITA_LANGUAGE: english

  - id: vitabench_delivery_one_task_smoke
    benchmark: vitabench
    adapter: vitabench
    adapter_script: run_vitabench.sh
    adapter_status: wired_legacy
    model_profile: gpt54mini_8130
    concurrency: 1
    params:
      VITA_DOMAIN: delivery
      VITA_TASK_SET_NAME: delivery
      VITA_TASK_IDS: 10711001
      NUM_TASKS: 1
      NUM_TRIALS: 1
      MAX_CONCURRENCY: 1
      VITA_MAX_STEPS: 20
      VITA_ENABLE_THINK: 0
      VITA_LANGUAGE: english

  - id: swebench_verified_qwen_code_smoke
