contract_basis: >-
  all 375 tasks share identical env/docker-compose.yaml (1 unique hash) + main Dockerfile (1) +
  runtime-server Dockerfile (1) => 2-image contract covers all 375; per-task variation is data only.

images:
  - id: tau3_full_main
    role: harbor_task_main_runtime
    required: true
    base_image: python:3.12-slim@sha256:<BASE_DIGEST_PENDING>     # HIGH-2: pin base by digest
    build_context: <task>/environment                            # Dockerfile identical across 375
    dockerfile_offline_ready: false                              # HIGH-2: must vendor tau2-bench@commit + internal apt/pip first
    image_ref: 100.97.118.137:8555/swe-data-harness/tau3-full-main@sha256:<DIGEST_PENDING_BUILD>
    fallback_tar: /mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench/images/tau3/tau3-full-main_<STAMP>.tar
    fallback_tar_sha256: <PENDING_BUILD>
  - id: tau3_full_runtime
    role: tau3_runtime_mcp_sidecar
    required: true
    base_image: python:3.12-slim@sha256:<BASE_DIGEST_PENDING>
    build_context: <task>/environment/runtime-server            # compose build: context ./runtime-server; identical across 375
    dockerfile_offline_ready: false
    extra_deps: ["fastmcp>=3.0"]                                 # must stage internally
    image_ref: 100.97.118.137:8555/swe-data-harness/tau3-full-runtime@sha256:<DIGEST_PENDING_BUILD>
    fallback_tar: /mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench/images/tau3/tau3-full-runtime_<STAMP>.tar
    fallback_tar_sha256: <PENDING_BUILD>

transport:
  registry: "100.97.118.137:8555"       # insecure-registry, self-signed CA — same as TB2.1
  digest_rows: 0                          # PENDING build
  fallback_rows: 0                        # PENDING build
  enable_gate: "scripts/check_offline_images_manifest.py --require-offline-transport --verify-fallback"   # must PASS before suite/full enable
  compose_runtime_build: true             # MEDIUM-1: compose still has build: — must switch task compose to image: <digest> after build

worker_target:                            # MEDIUM-2: NOT the retiring rootless-vfs contract
  kind: rjob_privileged
  docker_host: "unix:///var/run/docker.sock"
  ulimit_nofile: 65535
  transport_proof_required: true          # P0 by-digest pull + --network none compose-up of >=1 task/domain (4 tasks), main<->MCP-sidecar link under fuse-overlayfs = DoD-3
