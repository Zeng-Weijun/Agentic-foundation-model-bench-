# 55-review HARD requirement (transport-proof GATE): runtime image is generic (task_config.json NOT baked),
# so the EFFECTIVE compose MUST add the task_config mount + a fail-closed 375/375 preflight must pass.
effective_compose:
  mount_added_to_tau3_runtime: "./runtime-server/task_config.json:/app/task_config.json:ro"   # server.py reads fixed /app/task_config.json
  effective_compose_sha256: b3c8700bea384d34e27657a8482e1f5e370c652a86ced8789186349d141e8052    # mount-only transform, uniform across ALL 375 (preflight)
  effective_compose_full_sha256: e6966c384239d81d2415791617cb62a3b3645ec8ac12d230241fee0413b7d997  # FULL effective = original + mount + build:->image:@P0digest ; 375/375 uniform ; THIS is what transport-proof composes-up
  effective_compose_sample: images/tau3/effective-compose/tau3_effective_compose.sample.yaml
  vs_frozen_dataset_compose: "dataset.compose_sha256=e1aa85 is the ORIGINAL (no mount, build:) frozen pin; the effective compose above ADDS the mount + swaps build:->image:@P0digest for transport-proof"
  preflight_fail_closed: "python3 scripts/tau3_transport_preflight.py <dataset>"
  preflight_status: "PASS 375/375 (task_config_present=375/375, effective-compose mount_present=375/375, runtime_image=375/375, unique_effective=1) 2026-07-04"
  transport_proof_gate: "transport-proof PASS is FORBIDDEN until (1) this preflight PASSES + (2) Pod A --network none compose-up proves the main<->MCP-sidecar link WITH the /app/task_config.json mount effective"

# HIGH-4 (55 re-review): explicit 3-LLM relay contract — specific model names hard-pinned, single relay URL, NO defaults.
model_contract:
  relay_base_url: "http://100.96.122.22:18540/v1"         # pod-facing bench relay (OPENAI_BASE_URL). NOT the P0 image registry (100.97.118.137:8555).
  api_key_source: /data/nips/shared_bench/api_config.env  # OPENAI_API_KEY
  agent_model: gpt-5.4-mini                               # model under test (Qwen model id in Phase 2); reasoning_effort pinned per run to match anchor 口径 (default, not xhigh, for board-comparable)
  user_sim_model: gpt-5.4-mini                            # TAU2_USER_MODEL — FIXED across all agent runs; TAU2_USER_REASONING_EFFORT=low
  judge_model: gpt-5.4                                    # TAU2_NL_ASSERTIONS_MODEL — FIXED; stronger than agent to avoid self-grading when agent=gpt-5.4-mini
  per_role_health_check: chat_completion_1token_noproxy   # real completion per role (agent/user_sim/judge), curl --noproxy; not just /v1/models
  oracle_gold_token_note: "oracle NOT 0-token: user_sim + judge MUST report nonzero tokens; usage parsed per role"

