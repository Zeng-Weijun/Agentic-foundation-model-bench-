# =============================================================================
# ★ Structural blind spots in the strict gate — the most important output of this run
# =============================================================================
structural_blind_spots:
  infra_fail_excludes_llm_layer:
    code: 'scripts/tb21_strict_batch_summary.py L250: "infra_fail": bool(missing_artifact or fatal_timeout or tb_rc not in (0, None))'
    consequence: "125 hard LLM failures -> infra_fail still 0. Every historical TB2.1 score may have been affected by invisible LLM-layer faults with no gate ever warning."
  unknown_agent_error_not_infra:
    finding: "feal-linear-cryptanalysis died with failure_mode=unknown_agent_error and was bucketed as `unresolved`, indistinguishable from 'the model just failed the task'."
  status_blocked_is_uninformative:
    code: 'L309: ready = bool(total>0 and clean_pass==total and missing_artifact==0 and timeout==0 and infra_fail==0 and parse_error==0 and unresolved==0)'
    finding: "`ready` requires unresolved==0, so ANY real benchmark run is `blocked`. canonical was blocked (parse_error=1); this run is blocked (purely unresolved=36). `status=blocked` carries ZERO infra signal."
    implication: "The original rule 'status=blocked => not for main table' would reject every real run, canonical included. The v2 cause-based triage is the correct fix."

  proposal_not_implemented:
    metric: llm_health
    fields: [total_calls, retry_exhausted_count, http_5xx_count, http_429_count, hard_fail_rate, token_sum_vs_baseline]
    action: "any threshold breach -> ready=false, or at minimum stamp `llm_degraded` on the score (preferred: taint, don't block)"
    owner: runner_side_log_parser
    owner_rationale:
      tb_upstream: "most accurate (holds the HTTP response) but we do not control Terminal-Bench, and it already swallows the exception into a single log line"
      strict_summary_reducer: "WRONG PLACE -- it only reads results.json and per-task artifacts, and the LLM errors are not in any per-task artifact (see attribution.Q1)"
      runner_side_log_parser: "RECOMMENDED -- run.log is the only carrier; the runner already invokes tb21_closure_gate.sh, so bolt on `tb21_llm_health.py --run-log <path>`; zero upstream change"
    hard_limit: "This metric can only ever be RUN-level, never TASK-level (run.log has no timestamps and no task tags; c89 interleaves 89 tasks). Must be stated in the proposal so nobody later assumes per-task localisation is possible."
