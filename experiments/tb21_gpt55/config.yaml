      that the C2 "copy" ruling walked into. F1 (export REPO_ROOT=<main>) is provably equivalent
      (all 5 relatively-invoked scripts are byte-identical across both roots) but was rejected as
      broader than necessary: it also relocates cwd and several unrelated defaults.
