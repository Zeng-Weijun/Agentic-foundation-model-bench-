      DECISIONS 561-563 describes the STAGED contract as "5 independent pass@1 attempts" with
      output root .../terminal_bench_2_1_official_gpt55_poda and tiers 32->64->100. What actually
      ran was attempts=1, c=89. The launcher script itself hard-asserts attempts==1
      (`official attempt count must be 1`) and its tier list is "32 64 89 100".
    consequence: "The DECISIONS prose is stale relative to the script and the artifacts. Script + artifacts win."
    status: RESOLVED_IN_FAVOUR_OF_SCRIPT

