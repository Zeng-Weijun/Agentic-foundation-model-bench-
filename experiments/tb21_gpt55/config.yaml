    field: "env TB2_RUNTIME_CLOSURE_REPAIR, TB_DOCKER_FORCE_CLEANUP_HELPER"
    canonical: "$REPO_ROOT/scripts/<f>, where canonical's $REPO_ROOT was the MAIN repo"
    reproduction: "explicitly set to <main repo>/scripts/<f>"
    kind: env_seam_reset      # NOT a repo mutation: nothing is moved, copied, or symlinked
    justification: >-
      The 2026-07-07 patch made the runner derive REPO_ROOT from its own script path, so both
      defaults now point into the r3 worktree, where neither file exists. The runner itself exposes
      the seam (line 61 tests ${TB2_RUNTIME_CLOSURE_REPAIR+x}; line 53 uses ${VAR:-default}), so a
      pre-set value wins. F2 leaves repair_tb21_full89_runtime_closure.py to be invoked IN PLACE in
