        tb21_runtime_closure_static_gate.py  mtime 2026-07-01 11:30:06 +0800
        canonical run created_at             2026-07-04T19:54:19Z (= 2026-07-05 03:54 +0800)
      Both predate the canonical run, so they have not been modified since it. This is weaker
      evidence than a git object and is recorded as such. Option B (disabling the gate) was
