      own rerun scored 57/89 = 64.04% (DECISIONS 1889-1895). Therefore: running the canonical
      launcher today WITHOUT setting this to 0 would silently reproduce the 64.04% KVM run,
      not the 70.8% baseline. run.sh sets it to 0 explicitly.

