    justification: >-
      Today's r3 runner line 44 reads `export TB21_ENABLE_KVM_DEVICE="${TB21_ENABLE_KVM_DEVICE:-1}"`
      -- it DEFAULTS TO ON. The canonical launcher never sets this variable. Evidence that the
      canonical run had KVM OFF: score_json note for `make-doom-for-mips` says "qemu timeout=30 /
      no KVM; oracle also timed out", and surface85's gap decomposition (DECISIONS 671) attributes
