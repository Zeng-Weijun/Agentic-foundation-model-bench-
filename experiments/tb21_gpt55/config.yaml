# =============================================================================
# CANARY (3 tasks) -- added 2026-07-09 per BRIEF_85_canary.md
#
# The canary CANNOT go through stage_tb21_official_gpt55_launcher.sh: that script
# forces TB21_BATCH_SIZE=89 and only accepts concurrency tiers 32/64/89/100.
# It therefore calls the r3 privileged runner directly, replicating the launcher's
# exported env (see `launcher_exported_env_reference`) and overriding only what a
# 3-task subset requires.
#
# Task selection comes from the IMAGE MANIFEST, not the dataset: the runner derives
# its batch plan via `build_tb21_full89_batch_manifests.py --image-manifest ...`,
# which simply chunks manifest.images. A 3-entry subset manifest therefore yields
# exactly one batch of 3 tasks. dataset stays the full 89 so the static closure gate
# and the bind-payload preflight run over the same 89 rows as canonical.
# =============================================================================
canary:
  tasks:
    - largest-eigenval
    - configure-git-webserver
    - qemu-startup

  selection_rationale:
    largest-eigenval: >-
      Axis 1 -- an ordinary task that canonical RESOLVED (it is absent from the 27-row
      original_unresolved_table). Plain numerical compute: no git, no network, no emulation, so a
      failure here indicts the harness/env chain rather than any special capability. Chosen over
      the even shorter `git-leak-recovery` (0m45s) to keep the three axes disjoint -- that one is
      git-flavoured and would overlap axis 2. Harness duration estimate 3m30s, the 2nd cheapest
      resolved task.
    configure-git-webserver: >-
      Axis 2 -- offline/network semantics. Canonical RESOLVED it. It stands up a git server over
      HTTP inside the task container, so it exercises in-container networking while the offline
      closure must still hold; this is the natural place to watch `external_network_marker`.
      NOTE: per-task external_network_marker attribution for the canonical run was NOT recovered
      (no strict summary found under the launcher output root), so this pick is justified by task
      SEMANTICS, not by evidence that this specific task tripped the marker. Stated as hypothesis.
    qemu-startup: >-
      Axis 3 -- mandated by the brief. Verified present in the canonical 89 task_ids AND absent
      from the 27 unresolved rows, i.e. canonical PASSED it with no /dev/kvm. It is the direct
      control for `TB21_ENABLE_KVM_DEVICE=0`: if it passes without the device injected, the
      KVM-off guard is sound. (Sibling `qemu-alpine-ssh` also resolved; `make-doom-for-mips` and
      `install-windows-3.11` are the two qemu tasks canonical did NOT resolve, both classified
      env_ceiling "no KVM".)

  batch_size: 3        # -> exactly one batch containing all 3 tasks
  batch_start: 1
  batch_limit: 1
  concurrency: 3       # TB21_FULL_CONCURRENCY; runner clamps to min(concurrency, image_count)

  # Everything the canary writes lives under here. Nothing is written into the
  # canonical run roots.
  output_root: "/mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench/runs/terminal_bench_2_1_gpt55_canary"
  stage_root: "/mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/agentic-foundation-model-bench/runs/terminal_bench_2_1_gpt55_canary/stage"
  tag_prefix: "tb21_gpt55_canary3"

  # Runner env that differs from `launcher_exported_env_reference` for a 3-task run.
  env_overrides:
    TB21_BATCH_SIZE: "3"
    TB21_BATCH_START: "1"
    TB21_BATCH_LIMIT: "1"
    TB21_BATCH_RUN: "1"
    TB21_FULL_CONCURRENCY: "3"
    TB21_ENABLE_KVM_DEVICE: "0"
    TB21_STATIC_RUNTIME_CLOSURE_GATE: "1"
    TB21_STRICT_CLOSURE_GATE: "1"
    TB21_EXPECT_CLEAN: "0"
    TB21_ALLOW_ORACLE_SCORE: "0"
    TB21_RUN_CLEANUP_HELPER: "0"
    TB21_REMOVE_BATCH_IMAGES: "0"

  # PASS is judged on gates, not on score. All seven must hold.
  pass_criteria:
    - "3/3 task containers start (no docker exit-125)"
    - "preheat clean: present == image_count, missing == 0, errors == 0"
    - "bind-payload preflight: blocked == 0, errors == 0"
    - "static closure gate actually EXECUTED and PASSED (gate json emitted)"
    - "7200s timeout visible in the emitted tb CLI command.sh"
    - "artifact_manifest.json produced (written by the shared runner into BENCH_RUN_DIR)"
    - "relay calls 200 (not 401/5xx)"
    - "KVM off: log shows `kvm_device=disabled` and no /dev/kvm device injection"

  # The tb CLI flags are appended CONDITIONALLY by the shared runner:
  #   run_terminal_bench_2_1.sh only adds --global-agent-timeout-sec / --global-test-timeout-sec
  #   if `tb run --help` advertises them. This is exactly how run 20260707T161706Z silently fell
  #   back to the 900s default and had to be voided. Evidence file: $BENCH_RUN_DIR/command.sh
  #   (written via `printf '%q ' "${cmd[@]}" | tee`).
  timeout_evidence_file: "command.sh"
  artifact_manifest_note: "written by the shared runner at $BENCH_RUN_DIR/artifact_manifest.json (one per batch run_dir; it indexes the per-task tb artifact + results.json)."
