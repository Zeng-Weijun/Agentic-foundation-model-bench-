conflicts:
  runner_version_unrecoverable:
    severity: high
    finding: >-
      The canonical runner file is UNTRACKED by git (`git ls-files --error-unmatch` fails;
      it appears under `??` in `git status`). Its on-disk mtime is 2026-07-07 23:46, i.e. it
      was rewritten by the 2026-07-07 KVM-passthrough patch AFTER the canonical 2026-07-04 run.
      There is therefore NO git object for the version that produced 70.8%, and it cannot be
      restored. r3 worktree HEAD is c42f23c but that commit does not contain this file.
    consequence: >-
      Byte-identical runner reproduction is impossible. Beyond the KVM default (handled by the
      kvm_device_off guard), the 2026-07-07 patch also changed the runner to (a) materialize an
      effective dataset per tag, (b) rewrite payload bind paths, and (c) derive REPO_ROOT from the
      runner script path. Effects of (a)-(c) on a KVM-off run are UNVERIFIED.
    status: ACKED_2026_07_09
    resolution: >-
      orchestrator ACK, non-blocking. Consequence formally adopted: this canary and any follow-up
      full89 run are a RE-MEASUREMENT under today's environment, NOT a strict reproduction. Every
      deviation must stay explicitly declared in `deviations_from_canonical`.

  static_closure_gate_helper_missing:
    severity: high
    finding: >-
      The canonical run had TB21_STATIC_RUNTIME_CLOSURE_GATE=1 and the gate DID execute -- its
      outputs exist on disk (tb21_full89_runtime_closure_static_gate_<tag>.json, plus matrix
      .jsonl / .summary.json / vendor .sh). Today's runner does `REPO_ROOT="${REPO_ROOT:-$(cd
      "$SCRIPT_DIR/.." && pwd -P)}"; cd "$REPO_ROOT"` then calls the RELATIVE path
      `python3 scripts/build_tb21_full89_closure_matrix.py`. With REPO_ROOT unset that resolves
      inside the r3 worktree, where the helper DOES NOT EXIST (verified: r3 = NO, main repo = YES,
      s55 = NO). DECISIONS 1863 confirms the 07-07 KVM rerun had to disable this gate for exactly
      this reason.
    consequence: >-
      Launching today with the canonical TB21_STATIC_RUNTIME_CLOSURE_GATE=1 will fail the gate.
      Silently setting it to 0 would be an UNDECLARED deviation from canonical. Exporting
      REPO_ROOT=<main repo> is NOT a safe fix: the launcher reads the same variable name for
      itself, which would relocate STAGE_DIR / SCORES_DIR / ledger and break
      `python3 scripts/tb21_gpt55_official_ledger.py` (that helper exists only under s55).
    status: RESOLVED_2026_07_09_OPTION_A
    resolution: >-
      orchestrator ruled option A. surface:85 independently re-measured both helpers (mtime,
      sha256, tracked=NO) BEFORE copying, confirmed both r3 targets were absent, copied with
      `cp -p`, and re-verified sha256 after. See `closure_gate_helpers:` for the recorded hashes.
      TB21_STATIC_RUNTIME_CLOSURE_GATE stays at the canonical value 1. If the gate still fails,
      run.sh blocks -- it never downgrades to 0.
    options:
      - "A: copy scripts/build_tb21_full89_closure_matrix.py + tb21_runtime_closure_static_gate.py from the main repo into the r3 worktree (repo mutation; needs approval).  <-- CHOSEN"
      - "B: set static_runtime_closure_gate: 0 and record it as a THIRD declared deviation.  <-- REJECTED: drops offline-closure runtime interception (cf. Gradle false-zero reversal)."
      - "C: patch the runner to resolve the helper from an explicit TB21_CLOSURE_HELPER_ROOT.  <-- REJECTED: re-patches an already-unreproducible runner."

  # Discovered 2026-07-09 by the canary. This is the reason the canary blocked.
  closure_helper_file_anchored_repo_root:
    severity: high
    finding: >-
      `build_tb21_full89_closure_matrix.py` line 19 does
      `DEFAULT_REPO_ROOT = Path(__file__).resolve().parents[1]`, and line 32 derives
      `DEFAULT_R2_SUMMARY_DIR = DEFAULT_REPO_ROOT / "_coordination/20260625_harbor_bench/artifacts/tb21_closure_full89_r2"`.
      That directory holds 31 per-task summary files. `load_closed_runtime_hf_assets()` reads
      `<r2_summary_dir>/<task_id>.json` and returns [] when the file is absent -- silently, with no
      warning. Of the script's four `__file__`-anchored defaults, three (output / summary-output /
      vendor-commands-output) ARE overridden by the runner's explicit flags. DEFAULT_R2_SUMMARY_DIR
      is the only one that is NOT overridable: neither the runner nor the script's argparse exposes it.
    consequence: >-
      Copying the helper into the r3 worktree (C2 option A, as literally instructed) moved its anchor,
      so it looked for the r2 summaries under the r3 worktree, where they do not exist. The two
      hf_asset tasks `count-dataset-tokens` and `mteb-retrieve` therefore flipped from
      closed -> open, the static closure gate returned `status=runtime_closure_open open=2`, and the
      runner exited 24 before starting any container. Content identity (sha256) did NOT imply
      behaviour identity.
    evidence: >-
      Controlled, read-only, no containers: same script content, same dataset, only the file's
      LOCATION varied. main-repo copy -> open=0 (matches canonical). r3 copy -> open=2. temp-dir
      SYMLINK to the main copy -> open=0, and Path(...).resolve().parents[1] printed the main repo.
      Independently, a per-row diff of the canonical (2026-07-04) vs canary (2026-07-09) closure
      matrices shows 87/89 rows byte-identical and the 2 changed rows differ ONLY in
      closed_runtime_hf_assets <-> runtime_hf_assets. So neither the dataset nor the builder logic
      drifted; the anchor did.
    rules_out:
      dataset_drift: "87/89 matrix rows identical; the 2 changed rows carry the same hf:// asset lists, only re-classified"
      builder_version_drift: "sha256 identical to the main-repo file, which itself predates the canonical run (mtime 2026-07-02)"
      model: "never invoked -- the gate blocks before the batch loop, 0 containers, 0 relay completions"
    status: NEEDS_ORCHESTRATOR_APPROVAL_TO_APPLY_SYMLINK
    fix: "see closure_gate_helpers.proven_fix / proven_fix_command"
    not_applied_because: "BRIEF_85_canary.md: gate failure => stop, do not downgrade, do not self-retry."


  # Discovered 2026-07-09 by canary round 2 (AFTER the symlink fixed C2/C5).
  runner_repo_root_anchored_repair_script:
    severity: high
    finding: >-
      r3 runner line 61-62:
        if [[ -z "${TB2_RUNTIME_CLOSURE_REPAIR+x}" ]]; then
          export TB2_RUNTIME_CLOSURE_REPAIR="$REPO_ROOT/scripts/repair_tb21_full89_runtime_closure.py"
      Since the 2026-07-07 patch made REPO_ROOT derive from the runner's own script path, this resolves
      into the r3 worktree, which does NOT contain repair_tb21_full89_runtime_closure.py (it holds only
      the differently-hashed variants _r3.py and _r4.py). The shared runner
      (/mnt/.../swe/bench/shared/runners/run_terminal_bench_2_1.sh, line 34-35) then does
      `python3 "$TB2_RUNTIME_CLOSURE_REPAIR" --dataset "$TB_DATASET_PATH" --execute` under
      `set -euo pipefail`, so the missing file is fatal.
    consequence: >-
      Canary round 2 passed the closure gate (closed=89 open=0) and preheat, then died with
      `python3: can't open file .../r3/scripts/repair_tb21_full89_runtime_closure.py` -> rc=2, before
      Terminal-Bench was ever invoked. 0 containers, no command.sh, no artifact_manifest.json.
      This is the SAME CLASS as the C2/C5 bug (a path anchored into the isolated worktree) but a
      DISTINCT instance, and it is NOT caused by the symlink -- it was simply masked earlier because
      the gate blocked first.
    dependency_audit_2026_07_09: >-
      All 7 scripts the runner references were compared main-vs-r3 by sha256.
      IDENTICAL in both roots: agentic_bench_images.py, build_tb21_full89_batch_manifests.py,
      tb21_closure_gate.sh, build_tb21_full89_closure_matrix.py, tb21_runtime_closure_static_gate.py.
      (agentic_bench_images.py shows as ` M` in git but `diff main r3` = 0 lines.)
      MISSING in r3: repair_tb21_full89_runtime_closure.py (called -> fatal),
                     cleanup_tb21_worker.sh (NOT called while TB21_RUN_CLEANUP_HELPER=0 -- latent trap).
      Because every relatively-invoked script is byte-identical across the two roots, fixing this via
      the env seam and fixing it via REPO_ROOT are behaviourally equivalent. The fork collapses.
    canonical_repo_root_inference: >-
      Canonical must have run the runner with REPO_ROOT = the MAIN repo. Proof: the runner invokes
      `python3 scripts/build_tb21_full89_closure_matrix.py` relative to cwd=$REPO_ROOT, and that
      builder anchors DEFAULT_R2_SUMMARY_DIR on its own __file__. Canonical's gate returned closed=89,
      which is only possible if the builder it executed lived in the main repo. The same $REPO_ROOT
      therefore also made TB2_RUNTIME_CLOSURE_REPAIR point at <main>/scripts/repair_...py, whose mtime
      (2026-07-02 12:13:06 +0800) predates the canonical run (2026-07-04T19:54:19Z).
    status: RESOLVED_2026_07_09_F2
    resolution: "orchestrator approved F2 (tick7). Applied as canary.env_overrides + full89 env_overrides. F1 not adopted; aliasing _r3.py/_r4.py explicitly rejected."
    fix_preferred: >-
      F2 (surgical, no repo mutation): export
      TB2_RUNTIME_CLOSURE_REPAIR=<main>/scripts/repair_tb21_full89_runtime_closure.py
      The runner tests `${TB2_RUNTIME_CLOSURE_REPAIR+x}`, i.e. it explicitly honours a pre-set value.
      This is the seam the runner itself provides. Note the repair script has 2 `__file__` refs, so
      pointing at the main-repo path also keeps ITS anchor canonical.
    fix_alternative: >-
      F1: export REPO_ROOT=<main repo> for the runner. Restores canonical anchoring wholesale and is
      provably equivalent (see dependency_audit), but it also changes cwd -> `mkdir -p runs` inside the
      main repo and shifts several unrelated defaults. Rejected as broader than necessary.
    rejected: "symlinking repair_...py into r3 would work too, but F2 needs no repo mutation at all."
    not_applied_because: "BRIEF_85_canary_r2.md: any failed criterion => stop, attribute, do not retry."


  # D2 answer, 2026-07-09.
  cleanup_helper_missing_in_worktree:
    severity: medium
    finding: >-
      `cleanup_tb21_worker.sh` exists only in the main repo. The r3 runner touches it TWO ways:
      (a) lines 590/610 call the bare relative path `scripts/cleanup_tb21_worker.sh` -- NO env seam --
