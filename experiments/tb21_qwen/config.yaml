    constraints-scheduling: "canonical Qwen RESOLVED, agent 65.2s -- 3rd cheapest"
    git-leak-recovery: "canonical Qwen RESOLVED, agent 74.5s -- 5th cheapest"
    decision_rule: >-
      0/3 -> systematic serving degradation: STOP, fix the serving口径, do not spend a full89.
      >=1/3 -> task-level path divergence: full89 may proceed, carrying the first-class caveat
      that the serving instance is provably NOT equivalent (verdict v4 ruling 3).
    metric_to_record: "per task: tok_in, tok_out, command count, unique commands, converged? -- side by side with canonical"

  selection_rationale_batch1:
    prove-plus-comm: >-
      Axis 1 -- POSITIVE CONTROL. It is one of the 9 tasks canonical Qwen actually RESOLVED, and the
      cheapest of them (agent phase 40.3s). If the whole chain works -- sglang + the qwen3_coder
      tool-call parser + terminus-2 + the container + the tests -- this task must pass. With a model
      that only solves 9/89, a random pick would almost certainly fail and would tell us nothing
      about whether the chain is wired correctly.
    qemu-startup: >-
      Axis 2 -- KVM-OFF GUARD CONTROL, carried over from the gpt-5.5 lane. canonical Qwen did NOT
      resolve it (agent 75s), so an unresolved outcome here is the EXPECTED, matching result. What we
      are checking is that with TB21_ENABLE_KVM_DEVICE=0 the container still starts, runs and exits
      cleanly with no /dev/kvm injection -- i.e. the guard, not the score.
    bn-fit-modify: >-
      Axis 3 -- probes the ONE deviation we cannot eliminate. canonical Qwen failed this task with
      `context_length_exceeded` (an HTTP 400 / BadRequestError; 3 of the 6 canonical hard failures are
      of this family). Today's serving advertises max_model_len=262144. So this task directly asks:
      does the new serving instance change the failure MODE? Whatever it shows is a finding about the
      serving deviation, recorded as such -- not as a capability signal.

  batch_size: 4
