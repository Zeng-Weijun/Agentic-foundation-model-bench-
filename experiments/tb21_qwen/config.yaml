# ★ Correction to the gpt-5.5 lane's Q1 verdict (FULL89_TB21_GPT55_20260709.md)
# =============================================================================
correction_to_gpt55_lane_Q1:
  original_claim: "Q1 = UNRESOLVABLE_FROM_DISK -- no per-task artifact carries the 125 hard failures"
  why_it_was_wrong_procedurally:
    - "`find -maxdepth 4 -name '*debug*'` missed <task>/<trial>/agent-logs/episode-N/debug.json"
    - "the follow-up scan grepped for EXCEPTION CLASS names (ServiceUnavailableError / RateLimitError) while debug.json stores the HTTP PAYLOAD (`Error code: 503 - {...}`)"
    - "both are 'not found => does not exist'. The burden of proof is on the claimant. Same error class the orchestrator made with UNRECOVERABLE."
  exhaustive_rescan:
    key: "regex `Error code: (\\d{3})` over EVERY debug.json"
    gpt55_full89_mine:   {debug_json: 1668, with_error_code: 4, histogram: {503: 1, 404: 3}, attribution: {feal-linear-cryptanalysis: "503 x1", configure-git-webserver: "404 x3 (task's own HTTP, not the LLM)"}}
    gpt55_canonical:     {debug_json: 1214, with_error_code: 0}
    qwen_canonical:      {debug_json: 8687, with_error_code: 5, histogram: {400: 5}}
  corrected_verdict: ATTRIBUTABLE_ONLY_WHEN_THE_EPISODE_DIES
  corrected_statement: >-
    Per-task artifacts (agent-logs/episode-N/debug.json) DO exist and DO record HTTP error bodies, but each
    episode keeps only its last response. Therefore: a failure that TERMINATES the episode is per-task
    attributable; a failure swallowed by retry or overwritten by a later success is not. Of the 125 hard
    failures, exactly 1 is attributable this way (feal-linear-cryptanalysis, Error code: 503).
  what_survives: >-
    The n=1 exclusion-based attribution of feal is now INDEPENDENTLY CONFIRMED by a direct artifact.
    gpt-5.5 canonical's 0 error-bearing debug.json corroborates its relay-layer hard-failure count of 0.
    The `forbidden` verdict is unaffected; only the Q1 reasoning chain needed repair.
  llm_health_proposal_revision:
    was: "run-level only; per-task attribution impossible"
    now: >-
      TWO layers. (1) run-level counters parsed from run.log. (2) task-level `llm_error_last_episode`
      read straight from agent-logs/episode-N/debug.json -- free, and it is the most direct evidence for
      "was this task killed by infrastructure?". 400/content-class is always per-task attributable
      (the response has a body); 5xx/429 only when it ends the episode.
  also_corrected: >-
    `unknown_agent_error` can be caused by a plain HTTP 400 content error -- canonical Qwen's tune-mjcf and
    write-compressor both died that way. So inferring "relay fault" from `unknown_agent_error` alone is
    unsound. (For feal the conclusion happens to hold, but only because the 503 artifact exists.)

