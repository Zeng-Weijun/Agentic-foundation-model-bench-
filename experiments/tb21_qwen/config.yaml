    transport errors, none of which prefix caching can mask. Throughput and latency numbers here are
    NOT a capacity forecast.

# =============================================================================
# CANARY (3 tasks) — gates, not score
# =============================================================================
canary:
  # ★ BATCH 3 (2026-07-10): NEGATIVE control, n=4. Drawn from the 80 tasks canonical Qwen FAILED.
  # Logic (orchestrator): a shuffle moves outcomes BOTH ways. Losing some and gaining none is not a
  # shuffle. Positive control alone (sampled only from canonical's wins) cannot separate
  # "trajectory reshuffle" from "capability collapse" -- it only looks where a collapse would show.
  #   >=1 solved today -> capability conserved, trajectory reshuffle -> full89 may proceed
  #   0/4              -> same direction as the positive control's 1/4 -> capability drop, fix serving first
  # Batch 1 archived in s3_canary_result; batch 2 in positive_control_n4.
  tasks:
    - fix-git
    - kv-store-grpc
    - query-optimize
    - compile-compcert

  selection_rule_batch3_negative_control: >-
    Explicit, stated before running. A task qualifies iff ALL hold:
    (1) canonical Qwen FAILED it (is_resolved = false);
    (2) canonical failure_mode == `unset` -- i.e. the agent died of its own accord, NOT of
        test_timeout / unknown_agent_error / context_length_exceeded. This removes environment- and
        content-class deaths so that what we measure is capability, not the environment;
    (3) not already used in canary batch 1 (qemu-startup, bn-fit-modify) and not a known env-ceiling
        task (install-windows-3.11 / make-doom-for-mips are qemu ceilings);
    (4) 1:1 TASK-FAMILY pairing with each of the four positive controls;
    (5) cost-matched: canonical agent_sec, total_input_tokens and command count each fall INSIDE the
        range observed across the four positive controls (sec 40-74, tok_in 31,937-124,078, cmds 17-32);
    (6) prefer mid-band over cheapest -- the three shortest candidates (install-windows-3.11 28s,
        extract-moves-from-video 31s, video-processing 37s) were deliberately NOT taken, so this is
        not a cherry-pick of easy tasks.
    73 of the 80 canonical failures survive (2); 28 survive (5); the 4 below are the family-paired picks.

  selection_rationale_batch3:
    fix-git:          {pairs_with: git-leak-recovery,       family: git,                    canon_sec: 45, canon_tok_in: 57218,  canon_cmds: 22}
    kv-store-grpc:    {pairs_with: cancel-async-tasks,      family: "async/concurrent service", canon_sec: 40, canon_tok_in: 44768,  canon_cmds: 20}
    query-optimize:   {pairs_with: constraints-scheduling,  family: "optimization/solver",  canon_sec: 54, canon_tok_in: 68308,  canon_cmds: 23}
    compile-compcert: {pairs_with: prove-plus-comm,         family: "formal/verified compiler (CompCert is Coq-based, as is prove-plus-comm)", canon_sec: 62, canon_tok_in: 69899, canon_cmds: 27}

  selection_rationale_batch2:
