  proxy_policy: "Use the cluster HTTP proxy from ~/.bashrc for downloads and image pulls, but unset HTTP(S)_PROXY inside the Qwen Code agent process so OpenAI-compatible calls go directly to the internal SGLang endpoint."
  headless_command_shape: >-
    env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY
    qwen --channel CI -p '<prompt>' --yolo --auth-type openai
    --openai-base-url http://100.103.11.77:8503/v1
    --openai-api-key EMPTY
    --model qwen3-coder-30b-a3b-instruct
    --output-format stream-json
  swebench:
    scaffold: /mnt/shared-storage-user/mineru2-shared/zengweijun/nips2026/shared_bench/qwen_native_swebench/scripts/run_qwen_code_swebench.py
