serving:
  host_alias: worker_rkn9p
  host_ip: 100.103.11.77
  port: 8503
  context_profile: native_262k_no_yarn
  sglang_version: 0.5.10.post1
  sglang_target_version: 0.5.12.post1
  sglang_min_version_from_qwen36_card: 0.5.10
  active_python: /mnt/shared-storage-user/mineru2-shared/zengweijun/conda_envs/swedh/bin/python
  active_sglang_version_checked: 0.5.10.post1
  model_native_context_length: 262144
  active_context_length: 262144
  yarn_enabled: false
  serving_context_accounting: "SGLang --context-length 262144 is the total native window. Do not interpret this as 262144 input tokens plus 65536 output tokens."
  previous_stable_context_length: 65536
  active_sglang_note: "Use the pre-existing shared swedh env on worker_rkn9p for smoke/full runs; it satisfies Qwen's sglang>=0.5.10 guidance. Keep sglang_target_version as the desired install target, but record sglang_version as the live checked runtime."
  install_command: "uv pip install 'sglang[all]==0.5.12.post1'"
  install_fallback_command: "uv pip install 'sglang[all]==0.5.10.post1'"
  launch_command: >-
    python -m sglang.launch_server
    --model-path /mnt/shared-storage-user/mineru2-shared/zengweijun/models/Qwen3-Coder-30B-A3B-Instruct
    --served-model-name qwen3-coder-30b-a3b-instruct
    --host 0.0.0.0
    --port 8503
    --tp-size 2
    --mem-fraction-static 0.82
    --context-length 262144
    --tool-call-parser qwen3_coder
  health_check: "curl -s http://100.103.11.77:8503/v1/models"

